<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan · May 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛩️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ── RESET & TOKENS — Serene Navigator (Stitch) ─────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Core surfaces */
  --ink:#1a1c1c;--muted:#3f484e;--hint:#6f787f;
  --surface:#ffffff;--raised:#faf9f8;
  --surface-low:#f4f3f2;--surface-high:#e9e8e7;--surface-highest:#e3e2e1;
  --border:#eeeeed;--border-m:rgba(190,200,208,.4);
  /* Shadows — ambient only, very subtle */
  --shadow-sm:none;--shadow-md:none;
  --shadow-hover:0 24px 48px rgba(26,28,28,.06);
  /* Brand palette — Sky / Sage / Sand */
  --accent:#00658b;--accent-bg:#c4e7ff;--accent-container:#47a9da;
  --secondary:#536346;--secondary-container:#d6e9c3;
  --tertiary:#7d562d;--tertiary-container:#ffdcbd;
  /* Radii — card xl, pill for chips/btns */
  --r:16px;--rm:12px;--rs:9999px;
  /* Fonts */
  --serif:'Plus Jakarta Sans',system-ui,sans-serif;
  --sans:'Inter',system-ui,sans-serif;
  /* Semantic colour tokens — Stitch palette, no borders */
  --blue-bg:#c4e7ff;--blue-txt:#003b52;--blue-bd:transparent;
  --green-bg:#d6e9c3;--green-txt:#111f08;--green-bd:transparent;
  --amber-bg:#ffdcbd;--amber-txt:#4f2f08;--amber-bd:transparent;
  --pink-bg:#ffdcbd;--pink-txt:#4f2f08;--pink-bd:transparent;
  --red-bg:#ffdad6;--red-txt:#93000a;--red-bd:transparent;
  --purple-bg:#d6e9c3;--purple-txt:#3c4b30;--purple-bd:transparent;
}
@media(prefers-color-scheme:dark){
  :root{
    --ink:#e3e2e1;--muted:#bec8d0;--hint:#8a9299;
    --surface:#1a1c1c;--raised:#1f2120;
    --surface-low:#242625;--surface-high:#2f3130;--surface-highest:#353736;
    --border:#2f3130;--border-m:rgba(142,155,162,.25);
    --shadow-hover:0 24px 48px rgba(0,0,0,.35);
    --accent:#7dd0ff;--accent-bg:#001e2c;--accent-container:#004c69;
    --secondary:#bacca8;--secondary-container:#3c4b30;
    --tertiary:#f0bd8b;--tertiary-container:#623f18;
    --blue-bg:#001e2c;--blue-txt:#7dd0ff;--blue-bd:transparent;
    --green-bg:#111f08;--green-txt:#bacca8;--green-bd:transparent;
    --amber-bg:#2c1600;--amber-txt:#f0bd8b;--amber-bd:transparent;
    --pink-bg:#2c1600;--pink-txt:#f0bd8b;--pink-bd:transparent;
    --red-bg:#3b0009;--red-txt:#ffdad6;--red-bd:transparent;
    --purple-bg:#111f08;--purple-txt:#bacca8;--purple-bd:transparent;
  }
}

/* ── BASE ───────────────────────────────────────────────────────────────── */
body{font-family:var(--sans);color:var(--ink);background:var(--raised);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.6}
.page{max-width:960px;margin:0 auto;padding:0 24px 5rem}

/* ── HEADER ─────────────────────────────────────────────────────────────── */
.site-header{
  padding:2.5rem 0 1.5rem;
  border-bottom:none;
  margin-bottom:0;
  display:flex;align-items:flex-start;
  justify-content:space-between;gap:12px;
}
.trip-title{font-family:var(--serif);font-size:28px;font-weight:700;letter-spacing:-.5px;line-height:1.15}
.trip-meta{font-size:13px;color:var(--muted);margin-top:5px;letter-spacing:.01em}
.settings-btn{
  background:var(--surface-highest);border:none;
  border-radius:var(--rs);padding:7px 14px;
  color:var(--muted);cursor:pointer;font-size:12px;font-family:var(--sans);font-weight:500;
  transition:all .18s;flex-shrink:0;margin-top:4px;
}
.settings-btn:hover{background:var(--surface-high);color:var(--ink)}

/* ── SETTINGS PANEL ─────────────────────────────────────────────────────── */
.settings-panel{
  background:var(--surface-low);border:none;
  border-radius:var(--r);padding:18px 20px;
  margin-bottom:1.5rem;
  display:none;
}
.settings-panel.open{display:block}
.settings-title{font-size:13px;font-weight:600;margin-bottom:4px;font-family:var(--serif)}
.settings-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.65}
.settings-desc code{background:var(--surface-high);padding:1px 6px;border-radius:6px;font-size:11px}
.settings-row{display:flex;gap:8px;flex-wrap:wrap}
.settings-row input{
  flex:1;min-width:180px;padding:9px 14px;
  border:none;border-radius:var(--rm);
  font-family:var(--sans);font-size:13px;
  background:var(--surface-high);color:var(--ink);outline:none;
  transition:background .15s;
}
.settings-row input:focus{background:var(--surface)}
.settings-row button{
  padding:9px 20px;border-radius:var(--rs);border:none;
  background:var(--accent);color:#fff;
  font-family:var(--sans);font-size:13px;font-weight:600;
  cursor:pointer;transition:opacity .15s;
}
.settings-row button:hover{opacity:.85}
.settings-connected{
  font-size:11px;color:var(--green-txt);background:var(--green-bg);
  padding:6px 12px;border-radius:var(--rs);margin-top:10px;
  display:inline-block;font-weight:600;
}

/* ── TABS ───────────────────────────────────────────────────────────────── */
.tabs{
  display:flex;gap:0;margin-bottom:2rem;
  background:transparent;border:none;border-bottom:1px solid var(--border);
  border-radius:0;padding:0;
  width:100%;overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  font-family:var(--sans);font-size:13px;font-weight:500;
  padding:13px 20px;border-radius:0;border:none;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  background:transparent;color:var(--muted);
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.panel{display:none}.panel.active{display:block}

/* ── LOADING / ERROR ────────────────────────────────────────────────────── */
.loading{text-align:center;padding:4rem 0;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;animation:blink 1.4s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.error-banner{
  background:var(--red-bg);color:var(--red-txt);
  padding:14px 18px;border-radius:var(--rm);
  font-size:13px;line-height:1.65;margin-bottom:1rem;
}
.empty-state{color:var(--muted);font-size:13px;padding:2rem 0;line-height:1.6}

/* ── TRIP DAY GRID (Summary Tab) ─────────────────────────────────────────── */
.trip-day-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}
@media(max-width:800px){.trip-day-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.trip-day-grid{grid-template-columns:repeat(2,1fr)}}

.tdc{
  background:var(--surface);
  border:none;
  border-top:3px solid var(--border);
  border-radius:var(--rm);
  padding:14px 13px 12px;
  cursor:pointer;
  transition:box-shadow .18s,transform .18s,border-color .18s;
  display:flex;flex-direction:column;gap:4px;
  min-height:110px;
}
.tdc:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
.tdc-top{display:flex;justify-content:space-between;align-items:flex-start;line-height:1}
.tdc-num{font-size:22px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-1px;font-family:var(--serif)}
.tdc-dow{font-size:10px;font-weight:500;color:var(--muted);vertical-align:middle;letter-spacing:.2px}
.tdc-city{font-size:9px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:.6px;margin-top:4px}
.tdc-icon{font-size:26px;line-height:1;margin:4px 0 2px}
.tdc-area{
  font-size:11px;color:var(--muted);font-weight:500;line-height:1.35;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}

/* Legacy city-tag classes kept for map/other uses */
.city-tokyo  {background:var(--blue-bg);color:var(--blue-txt)}
.city-hakone {background:var(--green-bg);color:var(--green-txt)}
.city-kyoto  {background:var(--red-bg);color:var(--red-txt)}
.city-nara   {background:var(--amber-bg);color:var(--amber-txt)}
.city-osaka  {background:var(--purple-bg);color:var(--purple-txt)}
.city-other  {background:var(--surface-high);color:var(--muted)}

@media(max-width:480px){
  .tab{padding:10px 13px;font-size:12px}
  .tdc{min-height:90px}
  .tdc-num{font-size:18px}
  .tdc-icon{font-size:22px}
}

/* ── MULTI-DAY VIEW ─────────────────────────────────────────────────────── */
.hourly-view-bar{display:flex;justify-content:flex-end;margin-bottom:1rem}
.hv-toggle{
  display:flex;gap:3px;background:var(--surface-high);
  border:none;border-radius:var(--rs);
  padding:4px;
}
.hv-btn{
  font-family:var(--sans);font-size:12px;font-weight:500;
  padding:4px 14px;border-radius:var(--rs);border:none;
  background:transparent;color:var(--muted);
  cursor:pointer;transition:all .18s;
}
.hv-btn:hover{color:var(--ink)}
.hv-btn.active{background:var(--accent);color:#fff}
.multi-day-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-items:start}
.multi-day-col{
  background:var(--surface);border:none;
  border-radius:var(--r);overflow:hidden;
}
.multi-day-header{
  display:flex;gap:8px;align-items:center;
  padding:12px 14px;border-bottom:none;
  background:var(--surface-low);
}
.multi-day-emoji{font-size:20px;flex-shrink:0}
.multi-day-title{font-size:12px;font-weight:600;line-height:1.3}
.multi-day-date{font-size:10px;color:var(--muted);margin-top:1px}
.multi-day-col .tl-item{grid-template-columns:38px 1fr;padding:8px 10px}
.multi-day-col .tl-time{font-size:10px}
.multi-day-col .tl-name{font-size:12px}
.multi-day-col .tl-detail{font-size:11px}
.multi-day-col .tl-thumb{display:none}
.multi-day-col .tl-map{font-size:10px}
@media(max-width:700px){.multi-day-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.multi-day-grid{grid-template-columns:1fr}}

/* ── DAILY TAB ───────────────────────────────────────────────────────────── */
.daily-content-grid{
  display:grid;
  grid-template-columns:1fr 360px;
  gap:20px;
  align-items:start;
}
.daily-map-panel{
  position:sticky;top:20px;
  height:520px;border-radius:var(--r);
  border:none;overflow:hidden;
}
#daily-map{width:100%;height:100%}
@media(max-width:860px){
  .daily-content-grid{grid-template-columns:1fr}
  .daily-map-panel{position:static;height:300px;order:-1}
}
.day-select-bar{
  display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto;
  margin-bottom:1.5rem;padding-bottom:2px;scrollbar-width:none;
}
.day-select-bar::-webkit-scrollbar{display:none}
.day-btn{
  font-size:11px;padding:5px 14px;border-radius:var(--rs);
  border:none;background:var(--surface-high);
  color:var(--muted);cursor:pointer;font-family:var(--sans);font-weight:500;
  transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.day-btn:hover{color:var(--ink);background:var(--surface-highest)}
.day-btn.active{background:var(--accent);color:#fff}
.hourly-panel{display:none}.hourly-panel.active{display:block}
.hourly-header{
  display:grid;grid-template-columns:88px 1fr;
  gap:16px;margin-bottom:1.5rem;align-items:start;
}
.hourly-hero{
  border-radius:var(--rm);overflow:hidden;
  border:none;aspect-ratio:4/3;
  background:var(--surface-low);display:flex;
  align-items:center;justify-content:center;font-size:32px;
}
.hourly-hero img{width:100%;height:100%;object-fit:cover;display:block}
.h-title{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:3px;line-height:1.25;letter-spacing:-.02em}
.h-date{font-size:12px;color:var(--muted);margin-bottom:8px}
.h-note{
  font-size:12px;color:var(--amber-txt);background:var(--amber-bg);
  padding:8px 13px;border-radius:var(--rs);line-height:1.6;
}

/* ── TIMELINE ────────────────────────────────────────────────────────────── */
.tl-list{position:relative;display:flex;flex-direction:column;gap:2px}
.tl-item{
  display:grid;grid-template-columns:56px 1fr;
  gap:16px;padding:14px 12px;
  border-radius:var(--rm);
  transition:background .15s;
}
.tl-item:hover{background:var(--surface-low)}
.tl-time{
  font-size:10px;color:var(--hint);
  padding-top:2px;padding-right:4px;
  white-space:nowrap;font-weight:600;
  letter-spacing:.3px;text-align:right;
}
.tl-body{display:flex;gap:10px;align-items:flex-start}
.tl-thumb{
  display:block;width:52px;height:52px;border-radius:10px;
  object-fit:cover;flex-shrink:0;
}
.tl-text{flex:1;min-width:0}
.tl-name{font-size:14px;font-weight:600;margin-bottom:3px;line-height:1.35;font-family:var(--serif)}
.tl-detail{font-size:13px;color:var(--muted);line-height:1.65}
.tl-tags{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
/* Chips — pill-shaped, no borders, tonal fills */
.tl-tag{font-size:9px;padding:3px 10px;border-radius:var(--rs);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.t-syes{background:var(--green-bg);color:var(--green-txt)}
.t-sno{background:var(--red-bg);color:var(--red-txt)}
.t-carrier{background:var(--blue-bg);color:var(--blue-txt)}
.t-book{background:var(--amber-bg);color:var(--amber-txt)}
.t-nap{background:var(--purple-bg);color:var(--purple-txt)}
.tl-map{font-size:11px;color:var(--accent);text-decoration:none;margin-top:6px;display:inline-block;font-weight:600}
.tl-map:hover{text-decoration:underline}

/* ── HOTELS ─────────────────────────────────────────────────────────────── */
.hotels-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:700px){.hotels-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:420px){.hotels-grid{grid-template-columns:1fr}}
.hotel-card{
  background:var(--surface);border:none;
  border-radius:var(--r);overflow:hidden;
  transition:box-shadow .18s,transform .18s;
}
.hotel-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-3px)}
.hotel-img{width:100%;height:160px;object-fit:cover;display:block}
.hotel-img-placeholder{
  width:100%;height:160px;background:var(--surface-low);
  display:flex;align-items:center;justify-content:center;
  font-size:40px;
}
.hotel-body{padding:14px 16px}
.hotel-name{font-family:var(--serif);font-size:15px;font-weight:700;line-height:1.3;margin-bottom:3px;letter-spacing:-.01em}
.hotel-stars{color:#c69667;font-size:12px;letter-spacing:1px;margin-bottom:6px}
.hotel-meta{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.5}
.hotel-price-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.hotel-price-badge{
  font-size:11px;font-weight:700;
  background:var(--green-bg);color:var(--green-txt);
  padding:3px 10px;border-radius:var(--rs);
}
.hotel-price-total{font-size:11px;color:var(--muted);font-weight:500}
.hotel-notes{
  font-size:11px;color:var(--muted);line-height:1.6;
  margin-bottom:8px;padding:9px 12px;
  background:var(--surface-low);border-radius:var(--rm);
}
.hotel-map-link{font-size:11px;color:var(--accent);text-decoration:none;font-weight:600}
.hotel-map-link:hover{text-decoration:underline}

/* ── TIPS ───────────────────────────────────────────────────────────────── */
.tips-group{
  background:var(--surface);border:none;
  border-radius:var(--r);overflow:hidden;margin-bottom:12px;
}
.tips-group-header{
  font-family:var(--serif);font-size:15px;font-weight:700;
  padding:14px 20px;border-bottom:none;
  background:var(--surface-low);letter-spacing:-.01em;
}
.tip-row{padding:12px 20px;border-bottom:none;font-size:13px;transition:background .15s}
.tip-row:hover{background:var(--surface-low)}
.tip-row:last-child{}
.tip-name{font-weight:600;margin-bottom:2px}
.tip-detail{color:var(--muted);line-height:1.55;font-size:12px}

/* ── SUMMARY MAP ─────────────────────────────────────────────────────────── */
.summary-map-section{margin-top:2rem}
.summary-map-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;gap:8px;flex-wrap:wrap;
}
.summary-map-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-family:var(--sans)}
.map-filters{display:flex;gap:4px;flex-wrap:wrap}
.mf-btn{
  font-family:var(--sans);font-size:11px;font-weight:500;
  padding:4px 13px;border-radius:var(--rs);
  border:none;background:var(--surface-high);color:var(--muted);
  cursor:pointer;transition:all .15s;
}
.mf-btn:hover{background:var(--surface-highest);color:var(--ink)}
.mf-btn.active{background:var(--accent);color:#fff}
.gmap-frame{
  width:100%;height:460px;border-radius:var(--r);
  border:none;overflow:hidden;display:block;
}
/* ── LEAFLET: Google Maps–style overrides ───────────────────────────────── */
.leaflet-container{font-family:var(--sans)!important;background:#e8e0d8}
/* Zoom controls */
.leaflet-bar{border:none!important;box-shadow:0 1px 4px rgba(0,0,0,.22)!important;border-radius:6px!important;overflow:hidden}
.leaflet-bar a{
  width:32px!important;height:32px!important;line-height:32px!important;
  font-size:18px!important;color:#444!important;font-weight:400!important;
  background:#fff!important;border-bottom:1px solid #e0e0e0!important;
  border-radius:0!important;
}
.leaflet-bar a:last-child{border-bottom:none!important}
.leaflet-bar a:hover{background:#f5f5f5!important;color:#222!important}
/* Attribution */
.leaflet-control-attribution{
  font-size:10px!important;background:rgba(255,255,255,.75)!important;
  border-radius:4px 0 0 0!important;padding:2px 6px!important;
}
/* Popup: clean card like Google Maps */
.leaflet-popup-content-wrapper{
  border-radius:10px!important;
  box-shadow:0 2px 14px rgba(0,0,0,.18)!important;
  padding:0!important;overflow:hidden;
  border:none!important;
}
.leaflet-popup-content{margin:12px 14px 12px!important;min-width:160px}
.leaflet-popup-tip{background:#fff!important;box-shadow:none!important}
.leaflet-popup-close-button{
  top:6px!important;right:8px!important;
  font-size:16px!important;color:#888!important;
  width:20px!important;height:20px!important;
}
.leaflet-popup-close-button:hover{color:#222!important}

/* ── BUDGET ─────────────────────────────────────────────────────────────── */
.budget-summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
@media(max-width:600px){.budget-summary-grid{grid-template-columns:1fr}}
.budget-summary-card{
  background:var(--surface);border:none;
  border-radius:var(--r);padding:18px 20px;
}
.bsc-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.bsc-value{font-family:var(--serif);font-size:26px;font-weight:700;line-height:1.1;letter-spacing:-.03em}
.bsc-sub{font-size:11px;color:var(--muted);margin-top:4px}
.bsc-under{color:var(--secondary)}.bsc-over{color:var(--red-txt)}
.budget-cats{margin-bottom:20px}
.budget-cat-row{
  background:var(--surface);border:none;
  border-radius:var(--rm);padding:14px 18px;margin-bottom:8px;
}
.bcat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.bcat-name{font-weight:600;font-size:14px;font-family:var(--serif)}
.bcat-amounts{font-size:12px;color:var(--muted)}
.bcat-bar-track{height:6px;border-radius:3px;background:var(--surface-low);overflow:hidden}
.bcat-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.bcat-bar-ok{background:var(--secondary)}
.bcat-bar-warn{background:var(--tertiary)}
.bcat-bar-over{background:var(--red-txt)}

function renderSummaryMap(){

    `<button class="mf-btn${f.key==='all'?' active':''}" onclick="filterMapCity('${f.key}',this)">${f.label}</button>`
  ).join('');
  return `<div class="summary-map-section">

      <div class="map-filters">${btns}</div>

function initLeafletMap(){
  if(typeof L === 'undefined') return;
  const el = document.getElementById('leaflet-map');
  if(!el) return;
  if(_leafletMap){ _leafletMap.remove(); _leafletMap = null; }

  _leafletMap = L.map('leaflet-map', {zoomControl:true, scrollWheelZoom:false})
    .setView(CITY_ZOOM.all[0], CITY_ZOOM.all[1]);

  // Esri World Street Map: English labels everywhere (incl. Japan), Google Maps–like style, free
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',{
    attribution:'Tiles © <a href="https://www.esri.com/">Esri</a>',
    maxZoom:19
  }).addTo(_leafletMap);

  _cityLayers = {};
  Object.keys(CITY_COLORS).forEach(c => { _cityLayers[c] = L.layerGroup(); });

  for(const [name,[lat,lng,city]] of Object.entries(COORDS)){
    const color = CITY_COLORS[city]||'#9ca3af';
    // Teardrop pin — Google Maps style
    const icon = L.divIcon({
      className:'',
      html:`<div style="
        width:22px;height:28px;position:relative;
        filter:drop-shadow(0 2px 3px rgba(0,0,0,.35));">
        <svg viewBox="0 0 22 28" xmlns="http://www.w3.org/2000/svg" width="22" height="28">
          <path d="M11 0C4.925 0 0 4.925 0 11c0 7.636 11 17 11 17s11-9.364 11-17C22 4.925 17.075 0 11 0z"
                fill="${color}"/>
          <circle cx="11" cy="11" r="4.5" fill="rgba(255,255,255,0.85)"/>
        </svg>
      </div>`,
      iconSize:[22,28],
      iconAnchor:[11,28],
      popupAnchor:[0,-30]
    });
    const marker = L.marker([lat,lng],{icon});
    const imgSrc = ACTIVITY_IMAGES[name]||'';
    const imgHtml = imgSrc
      ? `<img src="${imgSrc}" style="width:180px;height:90px;object-fit:cover;border-radius:6px;margin-bottom:8px;display:block" onerror="this.style.display='none'">`
      : '';
    const dot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:5px;vertical-align:middle"></span>`;
    marker.bindPopup(
      `${imgHtml}`+
      `<div style="font-size:13px;font-weight:600;margin-bottom:6px;line-height:1.3">${dot}${name}</div>`+
      `<a href="${gm(name)}" target="_blank" style="font-size:12px;color:#1a73e8;text-decoration:none;font-weight:500">Open in Maps →</a>`,
      {maxWidth:200}
    );
    if(_cityLayers[city]) _cityLayers[city].addLayer(marker);
  }

  Object.values(_cityLayers).forEach(layer => layer.addTo(_leafletMap));
}

function filterMapCity(key, btn){
  document.querySelectorAll('.mf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(!_leafletMap) return;
  if(key==='all'){
    Object.values(_cityLayers).forEach(l => _leafletMap.addLayer(l));
  } else {
    Object.entries(_cityLayers).forEach(([city,l])=>{
      if(city===key) _leafletMap.addLayer(l);
      else _leafletMap.removeLayer(l);
    });
  }
  const z = CITY_ZOOM[key]||CITY_ZOOM.all;
  _leafletMap.flyTo(z[0], z[1], {duration:0.8});
}

// ── CSV FETCH ────────────────────────────────────────────────────────────────
function sheetUrl(tab){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;
}
async function fetchCSV(tab){
  const r = await fetch(sheetUrl(tab));
  if(!r.ok) throw new Error(`HTTP ${r.status} fetching tab "${tab}"`);
  return parseCSV(await r.text());
}
function parseCSV(text){
  const rows=[], lines=text.split(/\r?\n/), headers=splitCSV(lines[0]);
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const vals=splitCSV(lines[i]), obj={};
    headers.forEach((h,j)=>obj[h.replace(/^"|"$/g,'')]=(vals[j]||'').replace(/^"|"$/g,''));
    rows.push(obj);
  }
  return rows;
}
function splitCSV(line){
  const res=[],re=/("(?:[^"]|"")*"|[^,]*)/g; let m;
  while((m=re.exec(line))!==null){
    if(m.index===re.lastIndex) re.lastIndex++;
    res.push(m[1]);
  }
  return res;
}

// ── DATE PARSING ─────────────────────────────────────────────────────────────
function tryParseDate(str){
  if(!str) return null;
  const s = str.trim();
  let d;

  // gviz "Date(YYYY,M,D)" format
  const gv = s.match(/^Date\((\d+),(\d+),(\d+)\)/);
  if(gv) return new Date(+gv[1], +gv[2], +gv[3]);

  // ISO timestamp with T — always normalise via UTC to avoid timezone day-shift
  if(s.match(/^\d{4}-\d{2}-\d{2}T/)){
    d = new Date(s);
    if(!isNaN(d.getTime())) return new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
  }

  // YYYY-MM-DD
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(iso) return new Date(+iso[1], +iso[2]-1, +iso[3]);

  // M/D/YYYY or D/M/YYYY
  const sl4 = s.match(/^(\d{1,2})[\/](\d{1,2})[\/](\d{4})$/);
  if(sl4){ d = new Date(+sl4[3], +sl4[1]-1, +sl4[2]); if(!isNaN(d.getTime())) return d; }

  // Text month "May 14" etc — append year
  d = new Date(s + ', 2026');
  if(!isNaN(d.getTime())) return d;
  d = new Date(s + ' 2026');
  if(!isNaN(d.getTime())) return d;

  // Last resort — bare parse, but only accept reasonable years
  d = new Date(s);
  if(!isNaN(d.getTime()) && d.getFullYear() >= 2020 && d.getFullYear() <= 2035) return d;

  // If we got a date but year is wrong (e.g. 2-digit year parsed as 1926/2001),
  // keep the month/day and force 2026
  if(!isNaN(d.getTime())) return new Date(2026, d.getMonth(), d.getDate());

  return null;
}
function dateKey(d){ return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }

// ── RENDER CALENDAR ──────────────────────────────────────────────────────────
const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
const DOW_SHORT   = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const CITY_META = {
  tokyo:  {label:'Tokyo',  cls:'city-tokyo',  accent:'#3b82f6'},
  hakone: {label:'Hakone', cls:'city-hakone', accent:'#10b981'},
  kyoto:  {label:'Kyoto',  cls:'city-kyoto',  accent:'#ef4444'},
  nara:   {label:'Nara',   cls:'city-nara',   accent:'#f59e0b'},
  osaka:  {label:'Osaka',  cls:'city-osaka',  accent:'#8b5cf6'},
};
function cityTag(location){
  const l = (location||'').toLowerCase();
  for(const [key,meta] of Object.entries(CITY_META)){
    if(l.includes(key)) return meta;
  }
  return {label:(location||'').split(/[\s\-·,]/)[0].slice(0,8)||'?', cls:'city-other', accent:'#9ca3af'};
}

function renderCalendar(days){
  if(!days.length)
    return `<p class="empty-state">No trip days found. Check your Days sheet.</p>`;

  const DOW_ABBR = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const cards = days.map((d,i)=>{
    const parsed = tryParseDate(d.date);
    const dayNum = parsed ? parsed.getDate() : '?';
    const dowStr = d.dow
      ? d.dow.slice(0,3).toUpperCase()
      : (parsed ? DOW_ABBR[parsed.getDay()] : '');
    const tag    = cityTag(d.location);
    const area   = (d.location||'').includes('—')
      ? d.location.split('—')[1].trim()
      : (d.location||'').split(/[→·]/)[0].trim();
    return `<div class="tdc" style="border-top-color:${tag.accent}" onclick="openDay(${i})" title="${d.location||''}">
      <div class="tdc-top">
        <div><span class="tdc-num">${dayNum}</span> <span class="tdc-dow">${dowStr}</span></div>
        <span class="tdc-city">${tag.label}</span>
      </div>
      <div class="tdc-icon">${d.emoji||'📅'}</div>
      <div class="tdc-area">${area}</div>
    </div>`;
  }).join('');

  return `<div class="trip-day-grid">${cards}</div>`;
}

// ── DAILY TAB MAP ─────────────────────────────────────────────────────────────
let _dailyMap     = null;
let _dailyMarkers = null;

function initDailyMap(){
  if(typeof L === 'undefined') return;
  const el = document.getElementById('daily-map');
  if(!el) return;
  if(_dailyMap){ _dailyMap.remove(); _dailyMap = null; }

  _dailyMap = L.map('daily-map',{zoomControl:true,scrollWheelZoom:false})
    .setView([35.7,139.75],12);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',{
    attribution:'Tiles © <a href="https://www.esri.com/">Esri</a>',
    maxZoom:19
  }).addTo(_dailyMap);

  _dailyMarkers = L.layerGroup().addTo(_dailyMap);
}

function updateDailyMap(dayIdx){
  if(!_dailyMap || !_days[dayIdx]) return;
  _dailyMarkers.clearLayers();

  const d     = _days[dayIdx];
  const slots = _byDate[d.date]||[];
  const bounds = [];
  let   seq   = 0;

  slots.forEach(s=>{
    if(!s.map_query) return;
    const coord = COORDS[s.map_query];
    if(!coord) return;
    const [lat,lng,city] = coord;
    seq++;
    const color = CITY_COLORS[city]||'#BF3934';

    // Numbered teardrop pin
    const icon = L.divIcon({
      className:'',
      html:`<div style="width:26px;height:34px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.35))">
        <svg viewBox="0 0 26 34" xmlns="http://www.w3.org/2000/svg" width="26" height="34">
          <path d="M13 0C5.82 0 0 5.82 0 13c0 9.1 13 21 13 21s13-11.9 13-21C26 5.82 20.18 0 13 0z" fill="${color}"/>
          <circle cx="13" cy="13" r="7" fill="rgba(255,255,255,0.9)"/>
          <text x="13" y="17" text-anchor="middle" font-size="9" font-weight="700" font-family="Inter,sans-serif" fill="${color}">${seq}</text>
        </svg>
      </div>`,
      iconSize:[26,34], iconAnchor:[13,34], popupAnchor:[0,-36]
    });

    const marker = L.marker([lat,lng],{icon});
    const imgSrc = ACTIVITY_IMAGES[s.map_query]||'';
    const imgHtml = imgSrc
      ? `<img src="${imgSrc}" style="width:180px;height:90px;object-fit:cover;border-radius:6px;margin-bottom:8px;display:block" onerror="this.style.display='none'">`
      : '';
    const dot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:5px;vertical-align:middle"></span>`;
    marker.bindPopup(
      `${imgHtml}`+
      `<div style="font-size:11px;color:#888;margin-bottom:2px">${s.time||''}</div>`+
      `<div style="font-size:13px;font-weight:600;margin-bottom:4px;line-height:1.3">${dot}${s.name}</div>`+
      `<div style="font-size:12px;color:#555;margin-bottom:6px;line-height:1.4">${s.detail||''}</div>`+
      `<a href="${gm(s.map_query)}" target="_blank" style="font-size:12px;color:#1a73e8;text-decoration:none;font-weight:500">Open in Maps →</a>`,
      {maxWidth:200}
    );
    _dailyMarkers.addLayer(marker);
    bounds.push([lat,lng]);
  });

  if(bounds.length===1){
    _dailyMap.setView(bounds[0],15);
  } else if(bounds.length>1){
    _dailyMap.fitBounds(bounds,{padding:[32,32],maxZoom:15});
  }
}


// ── RENDER BUDGET ─────────────────────────────────────────────────────────────
function renderBudget(items){
  if(!items||!items.length)
    return `<p class="empty-state">No budget data found. Add a <strong>Budget</strong> tab with columns:<br>
      <code>category, item, planned, actual, notes</code></p>`;

  // Parse numbers: strip currency symbols, commas
  function parseMoney(v){ return parseFloat((v||'0').replace(/[^0-9.]/g,''))||0; }
  function fmtJPY(n){ return n===0?'—':'¥'+Math.round(n).toLocaleString('en'); }
  function fmtPLN(n){ return n===0?'—': Math.round(n).toLocaleString('en')+' zł'; }

  const totalJPY = items.reduce((s,i)=>s+parseMoney(i.yen),0);
  const totalPLN = items.reduce((s,i)=>s+parseMoney(i.pln),0);

  // Group by category
  const catOrder=[], catMap={};
  items.forEach(it=>{
    const cat = it.category||'Other';
    if(!catMap[cat]){ catMap[cat]=[]; catOrder.push(cat); }
    catMap[cat].push(it);
  });

  const catBars = catOrder.map(cat=>{
    const rows  = catMap[cat];
    const cjpy  = rows.reduce((s,i)=>s+parseMoney(i.yen),0);
    const cpln  = rows.reduce((s,i)=>s+parseMoney(i.pln),0);
    const pct   = totalJPY>0?Math.min(100,(cjpy/totalJPY)*100):0;
    return `<div class="budget-cat-row">
      <div class="bcat-header">
        <span class="bcat-name">${cat}</span>
        <span class="bcat-amounts">${fmtJPY(cjpy)} · ${fmtPLN(cpln)}</span>
      </div>
      <div class="bcat-bar-track"><div class="bcat-bar-fill bcat-bar-ok" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  // Category color palette for badges
  const catColors = ['--blue','--green','--amber','--pink','--red','--purple'];
  const catColorMap = {};
  catOrder.forEach((c,i)=>catColorMap[c]=catColors[i%catColors.length]);

  const tableRows = items.map(it=>{
    const jpy = parseMoney(it.yen);
    const pln = parseMoney(it.pln);
    const col = catColorMap[it.category||'Other'];
    return `<tr>
      <td><span class="bt-cat-badge" style="background:var(${col}-bg);color:var(${col}-txt);border:1px solid var(${col}-bd)">${it.category||'Other'}</span></td>
      <td>${it.item||''}<div class="bt-notes">${it.notes||''}</div></td>
      <td class="bt-planned">${fmtJPY(jpy)}</td>
      <td class="bt-actual">${fmtPLN(pln)}</td>
    </tr>`;
  }).join('');

  return `
    <div class="budget-summary-grid">
      <div class="budget-summary-card">
        <div class="bsc-label">Total (JPY)</div>
        <div class="bsc-value">${fmtJPY(totalJPY)}</div>
        <div class="bsc-sub">${items.length} line items</div>
      </div>
      <div class="budget-summary-card">
        <div class="bsc-label">Total (PLN)</div>
        <div class="bsc-value">${fmtPLN(totalPLN)}</div>
        <div class="bsc-sub">≈ ${(totalJPY/totalPLN||35).toFixed(0)} JPY per PLN</div>
      </div>
      <div class="budget-summary-card">
        <div class="bsc-label">Categories</div>
        <div class="bsc-value">${catOrder.length}</div>
        <div class="bsc-sub">breakdown below</div>
      </div>
    </div>
    <div class="budget-section-title">By Category</div>
    <div class="budget-cats">${catBars}</div>
    <div class="budget-section-title">All Items</div>
    <div class="budget-table-wrap">
      <table class="budget-table">
        <thead><tr><th>Category</th><th>Item</th><th>Yen (¥)</th><th>Złoty (zł)</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>`;
}

// ── TAB / DAY SWITCHING ───────────────────────────────────────────────────────
function switchTab(id, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
  if(id==='summary' && _leafletMap) setTimeout(()=>_leafletMap.invalidateSize(), 50);
  if(id==='hourly'  && _dailyMap)   setTimeout(()=>_dailyMap.invalidateSize(),   50);
}
function openDay(i){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector('.tabs').children[1].classList.add('active');
  document.getElementById('panel-hourly').classList.add('active');
  selDay(i);
}
function selDay(i){
  _currentDayIdx = i;
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
  const bar = document.getElementById('day-select-bar');
  if(bar&&bar.children[i]){
    bar.children[i].classList.add('active');
    bar.children[i].scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  }
  if(hourlyView==='single'){
    document.querySelectorAll('.hourly-panel').forEach(p=>p.classList.remove('active'));
    const hp = document.getElementById('hp-'+i);
    if(hp) hp.classList.add('active');
    updateDailyMap(i);
  } else {
    renderMultiDay(i);
  }
}

// ── LOAD ALL DATA ─────────────────────────────────────────────────────────────
async function loadAll(){
  if(!SHEET_ID){
    ['summary','hourly','hotels','tips','budget'].forEach(id=>
      document.getElementById('panel-'+id).innerHTML =
        `<p class="empty-state">Paste your Google Sheet ID above to load your itinerary.</p>`
    );
    return;
  }

  let days, schedule, hotels, tips, budget;
  try {
    [days, schedule, hotels, tips] = await Promise.all([
      fetchCSV(SHEET_TABS.days),
      fetchCSV(SHEET_TABS.schedule),
      fetchCSV(SHEET_TABS.hotels),
      fetchCSV(SHEET_TABS.tips)
    ]);
    // Budget tab is optional — show error inline if it fails
    try { budget = await fetchCSV(SHEET_TABS.budget); } catch(e){
      budget = [];
      document.getElementById('panel-budget').innerHTML = errorBanner(`Budget tab error: ${e.message}. Make sure the <strong>Budget</strong> sheet tab is published: <em>File → Share → Publish to web → Budget → CSV</em>.`);
    }
  } catch(e){
    const msg = `${e.message}. Check the Sheet ID and that it's published to the web.`;
    ['summary','hourly','hotels','tips','budget'].forEach(id=>
      document.getElementById('panel-'+id).innerHTML = errorBanner(msg)
    );
    return;
  }

  document.getElementById('panel-summary').innerHTML = renderCalendar(days) + renderSummaryMap();
  initLeafletMap();
  document.getElementById('panel-hourly').innerHTML  = renderHourly(days, schedule);
  initDailyMap();
  updateDailyMap(0);
  document.getElementById('panel-hotels').innerHTML  = renderHotels(hotels);
  document.getElementById('panel-tips').innerHTML    = renderTips(tips);
  document.getElementById('panel-budget').innerHTML  = renderBudget(budget);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
updateSettingsUI();
loadAll();
</script>
