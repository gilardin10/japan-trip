<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan · May 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ── RESET & TOKENS ─────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#111110;--muted:#6b6b6b;--hint:#aaa;
  --surface:#ffffff;--raised:#f7f6f3;
  --border:rgba(0,0,0,.08);--border-m:rgba(0,0,0,.15);
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.05);
  --shadow-hover:0 8px 28px rgba(0,0,0,.13),0 2px 8px rgba(0,0,0,.06);
  --r:16px;--rm:10px;--rs:6px;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --blue-bg:#E6F1FB;--blue-txt:#185FA5;--blue-bd:#B5D4F4;
  --green-bg:#EAF3DE;--green-txt:#3B6D11;--green-bd:#C0DD97;
  --amber-bg:#FAEEDA;--amber-txt:#854F0B;--amber-bd:#FAC775;
  --pink-bg:#FBEAF0;--pink-txt:#993556;--pink-bd:#F4C0D1;
  --red-bg:#FCEBEB;--red-txt:#A32D2D;--red-bd:#F7C1C1;
  --purple-bg:#EEEDFE;--purple-txt:#534AB7;--purple-bd:#CECBF6;
}
@media(prefers-color-scheme:dark){
  :root{
    --ink:#f0ede6;--muted:#909088;--hint:#5c5c54;
    --surface:#1a1916;--raised:#222120;
    --border:rgba(255,255,255,.08);--border-m:rgba(255,255,255,.15);
    --shadow-sm:0 1px 3px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.25);
    --shadow-md:0 4px 16px rgba(0,0,0,.5),0 1px 4px rgba(0,0,0,.3);
    --shadow-hover:0 8px 28px rgba(0,0,0,.6),0 2px 8px rgba(0,0,0,.3);
    --blue-bg:#0c2a4a;--blue-txt:#85B7EB;--blue-bd:#1d4f80;
    --green-bg:#1a2e0a;--green-txt:#97C459;--green-bd:#2d4f15;
    --amber-bg:#2e1e04;--amber-txt:#EF9F27;--amber-bd:#5a3a08;
    --pink-bg:#2a0f1a;--pink-txt:#ED93B1;--pink-bd:#4d1a2e;
    --red-bg:#2a0808;--red-txt:#F09595;--red-bd:#4d1414;
    --purple-bg:#1a1840;--purple-txt:#AFA9EC;--purple-bd:#302c6e;
  }
}

/* ── BASE ───────────────────────────────────────────────────────────────── */
body{font-family:var(--sans);color:var(--ink);background:var(--raised);min-height:100vh;-webkit-font-smoothing:antialiased}
.page{max-width:900px;margin:0 auto;padding:0 16px 4rem}

/* ── HEADER ─────────────────────────────────────────────────────────────── */
.site-header{
  padding:2rem 0 1.25rem;
  border-bottom:1px solid var(--border);
  margin-bottom:1.5rem;
  display:flex;align-items:flex-start;
  justify-content:space-between;gap:12px;
}
.trip-title{font-family:var(--serif);font-size:28px;font-weight:500;letter-spacing:-.3px;line-height:1.2}
.trip-meta{font-size:13px;color:var(--muted);margin-top:5px;letter-spacing:.1px}
.settings-btn{
  background:none;border:1px solid var(--border-m);
  border-radius:var(--rm);padding:7px 13px;
  color:var(--muted);cursor:pointer;font-size:13px;font-family:var(--sans);font-weight:500;
  transition:all .15s;flex-shrink:0;margin-top:4px;
}
.settings-btn:hover{background:var(--surface);color:var(--ink);border-color:var(--ink)}

/* ── SETTINGS PANEL ─────────────────────────────────────────────────────── */
.settings-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:16px 18px;
  margin-bottom:1.25rem;box-shadow:var(--shadow-sm);
  display:none;
}
.settings-panel.open{display:block}
.settings-title{font-size:13px;font-weight:600;margin-bottom:4px}
.settings-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.65}
.settings-desc code{background:var(--raised);padding:1px 5px;border-radius:4px;font-size:11px}
.settings-row{display:flex;gap:8px;flex-wrap:wrap}
.settings-row input{
  flex:1;min-width:180px;padding:8px 12px;
  border:1px solid var(--border-m);border-radius:var(--rm);
  font-family:var(--sans);font-size:13px;
  background:var(--raised);color:var(--ink);outline:none;
  transition:border-color .15s;
}
.settings-row input:focus{border-color:var(--ink)}
.settings-row button{
  padding:8px 18px;border-radius:var(--rm);border:none;
  background:var(--ink);color:var(--surface);
  font-family:var(--sans);font-size:13px;font-weight:600;
  cursor:pointer;transition:opacity .15s;
}
.settings-row button:hover{opacity:.78}
.settings-connected{
  font-size:11px;color:var(--green-txt);background:var(--green-bg);
  padding:6px 10px;border-radius:var(--rs);margin-top:10px;
  display:inline-block;border:1px solid var(--green-bd);font-weight:500;
}

/* ── TABS ───────────────────────────────────────────────────────────────── */
.tabs{
  display:flex;gap:2px;margin-bottom:1.5rem;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rm);padding:3px;
  width:fit-content;box-shadow:var(--shadow-sm);
}
.tab{
  font-family:var(--sans);font-size:13px;font-weight:500;
  padding:7px 16px;border-radius:7px;border:none;
  background:transparent;color:var(--muted);
  cursor:pointer;transition:all .18s;white-space:nowrap;
}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--ink);color:var(--surface);box-shadow:var(--shadow-sm)}
.panel{display:none}.panel.active{display:block}

/* ── LOADING / ERROR ────────────────────────────────────────────────────── */
.loading{text-align:center;padding:4rem 0;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block;animation:blink 1.4s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.error-banner{
  background:var(--red-bg);color:var(--red-txt);
  padding:14px 16px;border-radius:var(--rm);
  font-size:13px;line-height:1.65;margin-bottom:1rem;
  border:1px solid var(--red-bd);
}
.empty-state{color:var(--muted);font-size:13px;padding:2rem 0;line-height:1.6}

/* ── CALENDAR ───────────────────────────────────────────────────────────── */
.cal-month{margin-bottom:2rem}
.cal-month-name{
  font-family:var(--serif);font-size:19px;font-weight:500;
  margin-bottom:.875rem;letter-spacing:-.2px;
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{
  text-align:center;font-size:10px;font-weight:600;
  color:var(--hint);padding:0 0 8px;
  text-transform:uppercase;letter-spacing:.5px;
}
.cal-cell{
  min-height:100px;border-radius:var(--rm);
  padding:7px 6px 6px;
  display:flex;flex-direction:column;
  align-items:center;text-align:center;
}
.cal-cell.trip-day{
  background:var(--surface);
  border:1px solid var(--border);
  cursor:pointer;
  box-shadow:var(--shadow-sm);
  transition:transform .18s,box-shadow .18s,border-color .18s;
}
.cal-cell.trip-day:hover{
  box-shadow:var(--shadow-hover);
  transform:translateY(-2px);
  border-color:var(--border-m);
}
.cal-cell.flag-ok  {border-top:3px solid var(--green-txt)}
.cal-cell.flag-warn{border-top:3px solid var(--amber-txt)}
.cal-cell.flag-pack{border-top:3px solid var(--blue-txt)}
.cal-cell.flag-key {border-top:3px solid var(--pink-txt)}
.cal-day-num{font-size:10px;font-weight:700;color:var(--hint);align-self:flex-start;line-height:1}
.cal-cell.trip-day .cal-day-num{color:var(--muted)}
.cal-emoji{font-size:24px;margin:4px 0 3px;line-height:1.1;display:block}
.cal-loc{
  font-size:9px;color:var(--muted);font-weight:500;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  max-width:100%;line-height:1.2;
}
.cal-summary{
  font-size:8.5px;color:var(--muted);line-height:1.4;
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:3;-webkit-box-orient:vertical;
  text-align:left;max-width:100%;margin-top:3px;
}
.cal-cell-top{display:flex;justify-content:space-between;align-items:flex-start;width:100%;margin-bottom:2px}
.cal-city-tag{
  font-size:8px;font-weight:700;padding:2px 6px;border-radius:5px;
  white-space:nowrap;letter-spacing:.2px;line-height:1.4;flex-shrink:0;
}
.city-tokyo  {background:#FEE2E2;color:#991B1B}
.city-hakone {background:#F3E8D8;color:#7C4A1E}
.city-kyoto  {background:#FEF9C3;color:#854D0E}
.city-nara   {background:#DCFCE7;color:#166534}
.city-osaka  {background:#DBEAFE;color:#1E3A8A}
.city-other  {background:var(--raised);color:var(--muted)}
@media(max-width:500px){
  .cal-cell{min-height:70px;padding:5px 3px 3px}
  .cal-emoji{font-size:18px;margin:2px 0}
  .cal-summary{display:none}
  .tab{padding:7px 12px}
}

/* ── MULTI-DAY VIEW ─────────────────────────────────────────────────────── */
.hourly-view-bar{display:flex;justify-content:flex-end;margin-bottom:1rem}
.hv-toggle{
  display:flex;gap:2px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--rm);
  padding:3px;box-shadow:var(--shadow-sm);
}
.hv-btn{
  font-family:var(--sans);font-size:12px;font-weight:500;
  padding:5px 14px;border-radius:7px;border:none;
  background:transparent;color:var(--muted);
  cursor:pointer;transition:all .18s;
}
.hv-btn:hover{color:var(--ink)}
.hv-btn.active{background:var(--ink);color:var(--surface);box-shadow:var(--shadow-sm)}
.multi-day-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;align-items:start}
.multi-day-col{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);
}
.multi-day-header{
  display:flex;gap:8px;align-items:center;
  padding:10px 12px;border-bottom:1px solid var(--border);
  background:var(--raised);
}
.multi-day-emoji{font-size:20px;flex-shrink:0}
.multi-day-title{font-size:12px;font-weight:600;line-height:1.3}
.multi-day-date{font-size:10px;color:var(--muted);margin-top:1px}
.multi-day-col .tl-item{grid-template-columns:38px 1fr;padding:8px 10px}
.multi-day-col .tl-time{font-size:10px}
.multi-day-col .tl-name{font-size:12px}
.multi-day-col .tl-detail{font-size:11px}
.multi-day-col .tl-thumb{display:none}
.multi-day-col .tl-map{font-size:10px}
@media(max-width:700px){.multi-day-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.multi-day-grid{grid-template-columns:1fr}}

/* ── HOURLY TIMELINE ────────────────────────────────────────────────────── */
.day-select-bar{
  display:flex;gap:5px;flex-wrap:nowrap;overflow-x:auto;
  margin-bottom:1.25rem;padding-bottom:4px;scrollbar-width:none;
}
.day-select-bar::-webkit-scrollbar{display:none}
.day-btn{
  font-size:12px;padding:6px 12px;border-radius:var(--rm);
  border:1px solid var(--border);background:var(--surface);
  color:var(--muted);cursor:pointer;font-family:var(--sans);font-weight:500;
  transition:all .15s;white-space:nowrap;flex-shrink:0;box-shadow:var(--shadow-sm);
}
.day-btn:hover{color:var(--ink);border-color:var(--border-m)}
.day-btn.active{background:var(--ink);color:var(--surface);border-color:var(--ink)}
.hourly-panel{display:none}.hourly-panel.active{display:block}
.hourly-header{
  display:grid;grid-template-columns:100px 1fr;
  gap:16px;margin-bottom:1.5rem;align-items:start;
}
.hourly-hero{
  border-radius:var(--rm);overflow:hidden;
  border:1px solid var(--border);aspect-ratio:4/3;
  background:var(--raised);display:flex;
  align-items:center;justify-content:center;font-size:36px;
  box-shadow:var(--shadow-sm);
}
.hourly-hero img{width:100%;height:100%;object-fit:cover;display:block}
.h-title{font-family:var(--serif);font-size:20px;font-weight:500;margin-bottom:3px;line-height:1.3}
.h-date{font-size:12px;color:var(--muted);margin-bottom:8px}
.h-note{
  font-size:12px;color:var(--amber-txt);background:var(--amber-bg);
  padding:7px 11px;border-radius:var(--rm);line-height:1.5;
  border:1px solid var(--amber-bd);
}
.tl-item{
  display:grid;grid-template-columns:48px 1fr;
  gap:12px;padding:13px 0;
  border-bottom:1px solid var(--border);
}
.tl-item:last-child{border-bottom:none}
.tl-time{font-size:11px;color:var(--hint);padding-top:3px;white-space:nowrap;font-weight:600;letter-spacing:.2px}
.tl-body{display:flex;gap:10px;align-items:flex-start}
.tl-thumb{
  width:54px;height:54px;border-radius:var(--rs);
  object-fit:cover;flex-shrink:0;
  border:1px solid var(--border);box-shadow:var(--shadow-sm);
}
.tl-text{flex:1;min-width:0}
.tl-name{font-size:14px;font-weight:600;margin-bottom:2px;line-height:1.3}
.tl-detail{font-size:12px;color:var(--muted);line-height:1.55}
.tl-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.tl-tag{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:500;border:1px solid var(--border);color:var(--muted)}
.t-syes{background:var(--green-bg);color:var(--green-txt);border-color:var(--green-bd)}
.t-sno{background:var(--red-bg);color:var(--red-txt);border-color:var(--red-bd)}
.t-carrier{background:var(--blue-bg);color:var(--blue-txt);border-color:var(--blue-bd)}
.t-book{background:var(--amber-bg);color:var(--amber-txt);border-color:var(--amber-bd)}
.t-nap{background:var(--purple-bg);color:var(--purple-txt);border-color:var(--purple-bd)}
.tl-map{font-size:11px;color:var(--blue-txt);text-decoration:none;margin-top:5px;display:inline-block;font-weight:500}
.tl-map:hover{text-decoration:underline}

/* ── HOTELS ─────────────────────────────────────────────────────────────── */
.hotel-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;margin-bottom:12px;
  box-shadow:var(--shadow-sm);transition:transform .18s,box-shadow .18s;
}
.hotel-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.hotel-img{width:100%;height:200px;object-fit:cover;display:block}
.hotel-img-placeholder{
  width:100%;height:200px;background:var(--raised);
  display:flex;align-items:center;justify-content:center;
  font-size:52px;border-bottom:1px solid var(--border);
}
.hotel-body{padding:18px 20px}
.hotel-name{font-family:var(--serif);font-size:20px;font-weight:500;line-height:1.3;margin-bottom:4px}
.hotel-stars{color:#E8A020;font-size:14px;letter-spacing:1px;margin-bottom:8px}
.hotel-meta{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6}
.hotel-price-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.hotel-price-badge{
  font-size:13px;font-weight:700;
  background:var(--green-bg);color:var(--green-txt);
  padding:5px 11px;border-radius:7px;border:1px solid var(--green-bd);
}
.hotel-price-total{font-size:12px;color:var(--muted);font-weight:500}
.hotel-notes{
  font-size:12px;color:var(--muted);line-height:1.65;
  margin-bottom:12px;padding:10px 12px;
  background:var(--raised);border-radius:var(--rs);
  border:1px solid var(--border);
}
.hotel-map-link{font-size:12px;color:var(--blue-txt);text-decoration:none;font-weight:600}
.hotel-map-link:hover{text-decoration:underline}

/* ── TIPS ───────────────────────────────────────────────────────────────── */
.tips-group{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;margin-bottom:10px;
  box-shadow:var(--shadow-sm);
}
.tips-group-header{
  font-family:var(--serif);font-size:15px;font-weight:500;
  padding:12px 18px;border-bottom:1px solid var(--border);
  background:var(--raised);
}
.tip-row{padding:11px 18px;border-bottom:1px solid var(--border);font-size:13px}
.tip-row:last-child{border-bottom:none}
.tip-name{font-weight:600;margin-bottom:2px}
.tip-detail{color:var(--muted);line-height:1.55;font-size:12px}
</style>
</head>
<body>
<div class="page">

  <header class="site-header">
    <div>
      <div class="trip-title">Japan · May 2026</div>
      <div class="trip-meta">15 nights · Tokyo · Hakone · Kyoto · Osaka</div>
    </div>
    <button class="settings-btn" onclick="toggleSettings()">⚙ Settings</button>
  </header>

  <div class="settings-panel" id="settings-panel">
    <div class="settings-title">Connect Google Sheet</div>
    <div class="settings-desc">
      Paste your <strong>Sheet ID</strong> — the string in your Sheet URL between <code>/d/</code> and <code>/edit</code>.
      Make sure the sheet is published: <em>File → Share → Publish to web → Each sheet as CSV.</em>
    </div>
    <div class="settings-row">
      <input type="text" id="sheet-id-input" placeholder="Sheet ID or full URL" />
      <button onclick="saveSheetId()">Connect</button>
    </div>
    <div id="sheet-connected" class="settings-connected" style="display:none">✓ Connected</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('summary',this)">Summary</button>
    <button class="tab" onclick="switchTab('hourly',this)">Hour by hour</button>
    <button class="tab" onclick="switchTab('hotels',this)">Hotels</button>
    <button class="tab" onclick="switchTab('tips',this)">Tips</button>
  </div>

  <div class="panel active" id="panel-summary"><div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>
  <div class="panel" id="panel-hourly"><div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>
  <div class="panel" id="panel-hotels"><div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>
  <div class="panel" id="panel-tips"><div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>

</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const SHEET_TABS = { days:'Days', schedule:'Schedule', hotels:'Hotels', tips:'Tips' };
const LS_KEY = 'jp2026_sheet_id';
let SHEET_ID = localStorage.getItem(LS_KEY) || '';

function saveSheetId(){
  const val = document.getElementById('sheet-id-input').value.trim();
  if(!val){ alert('Please paste a Sheet ID'); return; }
  const m = val.match(/\/d\/([a-zA-Z0-9_-]+)/);
  SHEET_ID = m ? m[1] : val;
  localStorage.setItem(LS_KEY, SHEET_ID);
  updateSettingsUI();
  loadAll();
}

function toggleSettings(){
  const p = document.getElementById('settings-panel');
  p.classList.toggle('open');
}

function updateSettingsUI(){
  const connEl = document.getElementById('sheet-connected');
  const input  = document.getElementById('sheet-id-input');
  if(SHEET_ID){
    input.value = SHEET_ID;
    connEl.style.display = 'inline-block';
  } else {
    connEl.style.display = 'none';
    document.getElementById('settings-panel').classList.add('open');
  }
}

// ── CSV FETCH ────────────────────────────────────────────────────────────────
function sheetUrl(tab){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;
}
async function fetchCSV(tab){
  const r = await fetch(sheetUrl(tab));
  if(!r.ok) throw new Error(`HTTP ${r.status} fetching tab "${tab}"`);
  return parseCSV(await r.text());
}
function parseCSV(text){
  const rows=[], lines=text.split(/\r?\n/), headers=splitCSV(lines[0]);
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const vals=splitCSV(lines[i]), obj={};
    headers.forEach((h,j)=>obj[h.replace(/^"|"$/g,'')]=(vals[j]||'').replace(/^"|"$/g,''));
    rows.push(obj);
  }
  return rows;
}
function splitCSV(line){
  const res=[],re=/("(?:[^"]|"")*"|[^,]*)/g; let m;
  while((m=re.exec(line))!==null){
    if(m.index===re.lastIndex) re.lastIndex++;
    res.push(m[1]);
  }
  return res;
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function gm(q){ return 'https://www.google.com/maps/search/'+encodeURIComponent(q); }
function errorBanner(msg){
  return `<div class="error-banner"><strong>Could not load data.</strong> ${msg}<br>
    Make sure the sheet is published: <em>File → Share → Publish to web → Each sheet as CSV.</em></div>`;
}
function loadingHTML(){
  return '<div class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
}

// ── DATE PARSING ─────────────────────────────────────────────────────────────
function tryParseDate(str){
  if(!str) return null;
  const s = str.trim();
  // gviz "Date(YYYY,M,D)" format
  const gv = s.match(/^Date\((\d+),(\d+),(\d+)\)/);
  if(gv) return new Date(+gv[1], +gv[2], +gv[3]);
  // ISO timestamp — normalise to local midnight using UTC components to avoid day-shift
  if(s.includes('T') || (s.includes('-') && s.length > 10)){
    const d = new Date(s);
    if(!isNaN(d.getTime())) return new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
  }
  let d = new Date(s);
  if(!isNaN(d.getTime())) return d;
  d = new Date(s + ' 2026');
  if(!isNaN(d.getTime())) return d;
  d = new Date(s + ', 2026');
  if(!isNaN(d.getTime())) return d;
  // DD/MM/YYYY
  const dmy = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(dmy){ d = new Date(+dmy[3], +dmy[2]-1, +dmy[1]); if(!isNaN(d.getTime())) return d; }
  return null;
}
function dateKey(d){ return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }

// ── RENDER CALENDAR ──────────────────────────────────────────────────────────
const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
const DOW_SHORT   = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function cityTag(location){
  const l = (location||'').toLowerCase();
  if(l.includes('tokyo'))  return {label:'Tokyo',  cls:'city-tokyo'};
  if(l.includes('hakone')) return {label:'Hakone', cls:'city-hakone'};
  if(l.includes('kyoto'))  return {label:'Kyoto',  cls:'city-kyoto'};
  if(l.includes('nara'))   return {label:'Nara',   cls:'city-nara'};
  if(l.includes('osaka'))  return {label:'Osaka',  cls:'city-osaka'};
  return {label:(location||'').split(/[\s\-·,]/)[0].slice(0,8), cls:'city-other'};
}

function renderCalendar(days){
  const dateMap = {};
  days.forEach((d,i)=>{
    const parsed = tryParseDate(d.date);
    if(parsed) dateMap[dateKey(parsed)] = {d, i};
  });

  if(!Object.keys(dateMap).length)
    return `<p class="empty-state">Could not parse trip dates. Use a format like "May 1" or "2026-05-01" in your <em>days</em> sheet.</p>`;

  const allParsed = days.map(d=>tryParseDate(d.date)).filter(Boolean);
  const minD = new Date(Math.min(...allParsed.map(d=>d.getTime())));
  const maxD = new Date(Math.max(...allParsed.map(d=>d.getTime())));

  let html = '';
  let yr = minD.getFullYear(), mo = minD.getMonth();
  const endYr = maxD.getFullYear(), endMo = maxD.getMonth();
  while(yr < endYr || (yr===endYr && mo<=endMo)){
    html += renderCalMonth(yr, mo, dateMap);
    mo++; if(mo>11){mo=0;yr++;}
  }
  return html;
}

function renderCalMonth(yr, mo, dateMap){
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  let startDow = new Date(yr, mo, 1).getDay();
  startDow = startDow===0 ? 6 : startDow-1;

  const headers = DOW_SHORT.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  let cells = '';

  for(let i=0;i<startDow;i++) cells += `<div class="cal-cell"></div>`;

  for(let day=1;day<=daysInMonth;day++){
    const key = `${yr}-${mo}-${day}`;
    const entry = dateMap[key];
    if(entry){
      const {d,i} = entry;
      const flag  = d.flag||'ok';
      const tag   = cityTag(d.location);
      const summary = [d.highlight_1,d.highlight_2,d.highlight_3,d.highlight_4]
        .filter(Boolean).map(h=>h.split('—')[0].trim()).join(' · ');
      cells += `<div class="cal-cell trip-day flag-${flag}" onclick="openDay(${i})" title="${d.location}">
        <div class="cal-cell-top">
          <span class="cal-day-num">${day}</span>
          <span class="cal-city-tag ${tag.cls}">${tag.label}</span>
        </div>
        <span class="cal-emoji">${d.emoji||'📅'}</span>
        <span class="cal-summary">${summary}</span>
      </div>`;
    } else {
      cells += `<div class="cal-cell"><span class="cal-day-num">${day}</span></div>`;
    }
  }

  return `<div class="cal-month">
    <div class="cal-month-name">${MONTH_NAMES[mo]} ${yr}</div>
    <div class="cal-grid">${headers}${cells}</div>
  </div>`;
}

// ── MULTI-DAY STATE ───────────────────────────────────────────────────────────
let hourlyView = 'single';
let _days = [], _byDate = {}, _currentDayIdx = 0;

function setHourlyView(view){
  hourlyView = view;
  document.querySelectorAll('.hv-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.hv-btn[data-view="${view}"]`).classList.add('active');
  const single = document.getElementById('hourly-panels');
  const multi  = document.getElementById('multi-day-container');
  if(view==='single'){
    single.style.display=''; multi.style.display='none';
    selDay(_currentDayIdx);
  } else {
    single.style.display='none'; multi.style.display='';
    renderMultiDay(_currentDayIdx);
  }
}

function renderMultiDay(startIdx){
  const container = document.getElementById('multi-day-container');
  if(!container) return;
  const cols = Math.min(3, _days.length - startIdx);
  let html = '<div class="multi-day-grid">';
  for(let ci=0; ci<cols; ci++){
    const idx = startIdx + ci;
    const d   = _days[idx];
    const slots = _byDate[d.date]||[];
    const rows = slots.map(s=>{
      const tags=[];
      if(s.tag_stroller==='yes') tags.push(`<span class="tl-tag t-syes">stroller OK</span>`);
      if(s.tag_stroller==='no')  tags.push(`<span class="tl-tag t-sno">no stroller</span>`);
      if(s.tag_carrier==='yes')  tags.push(`<span class="tl-tag t-carrier">carrier</span>`);
      if(s.tag_book==='yes')     tags.push(`<span class="tl-tag t-book">book ahead</span>`);
      if(s.tag_nap==='yes')      tags.push(`<span class="tl-tag t-nap">nap time</span>`);
      return `<div class="tl-item">
        <div class="tl-time">${s.time}</div>
        <div class="tl-body">
          <div class="tl-text">
            <div class="tl-name">${s.name}</div>
            <div class="tl-detail">${s.detail}</div>
            ${tags.length?`<div class="tl-tags">${tags.join('')}</div>`:''}
            ${s.map_query?`<a class="tl-map" href="${gm(s.map_query)}" target="_blank">Maps →</a>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
    html += `<div class="multi-day-col">
      <div class="multi-day-header">
        <span class="multi-day-emoji">${d.emoji||'📅'}</span>
        <div>
          <div class="multi-day-title">${d.location}</div>
          <div class="multi-day-date">${d.date} · ${d.dow}</div>
        </div>
      </div>
      <div>${rows||`<p style="color:var(--muted);font-size:12px;padding:10px 12px">No entries.</p>`}</div>
    </div>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

// ── RENDER HOURLY ─────────────────────────────────────────────────────────────
function renderHourly(days, schedule){
  _days = days;
  _byDate={};
  schedule.forEach(s=>{ if(!_byDate[s.date]) _byDate[s.date]=[]; _byDate[s.date].push(s); });
  const byDate = _byDate;

  const bar = days.map((d,i)=>
    `<button class="day-btn${i===0?' active':''}" onclick="selDay(${i})">${d.date}</button>`
  ).join('');

  const panels = days.map((d,i)=>{
    const slots = byDate[d.date]||[];
    const isWarn = d.flag!=='ok';
    const rows = slots.map(s=>{
      const tags=[];
      if(s.tag_stroller==='yes') tags.push(`<span class="tl-tag t-syes">stroller OK</span>`);
      if(s.tag_stroller==='no')  tags.push(`<span class="tl-tag t-sno">no stroller</span>`);
      if(s.tag_carrier==='yes')  tags.push(`<span class="tl-tag t-carrier">carrier</span>`);
      if(s.tag_book==='yes')     tags.push(`<span class="tl-tag t-book">book ahead</span>`);
      if(s.tag_nap==='yes')      tags.push(`<span class="tl-tag t-nap">nap time</span>`);
      const thumb = s.image_url
        ? `<img class="tl-thumb" src="${s.image_url}" alt="${s.name}" loading="lazy" onerror="this.style.display='none'">`
        : '';
      return `<div class="tl-item">
        <div class="tl-time">${s.time}</div>
        <div class="tl-body">
          ${thumb}
          <div class="tl-text">
            <div class="tl-name">${s.name}</div>
            <div class="tl-detail">${s.detail}</div>
            ${tags.length?`<div class="tl-tags">${tags.join('')}</div>`:''}
            ${s.map_query?`<a class="tl-map" href="${gm(s.map_query)}" target="_blank">Maps →</a>`:''}
          </div>
        </div>
      </div>`;
    }).join('');

    return `<div class="hourly-panel${i===0?' active':''}" id="hp-${i}">
      <div class="hourly-header">
        <div class="hourly-hero">${d.emoji||'📅'}</div>
        <div>
          <div class="h-title">${d.location}</div>
          <div class="h-date">${d.date} · ${d.dow}</div>
          ${isWarn?`<div class="h-note">${d.flag_label}${d.highlight_1?' — '+d.highlight_1:''}</div>`:''}
        </div>
      </div>
      <div>${rows||`<p class="empty-state">No schedule entries for this day.</p>`}</div>
    </div>`;
  }).join('');

  return `<div class="hourly-view-bar">
    <div class="hv-toggle">
      <button class="hv-btn active" data-view="single" onclick="setHourlyView('single')">Single day</button>
      <button class="hv-btn" data-view="multi" onclick="setHourlyView('multi')">3 days</button>
    </div>
  </div>
  <div class="day-select-bar" id="day-select-bar">${bar}</div>
  <div id="hourly-panels">${panels}</div>
  <div id="multi-day-container" style="display:none"></div>`;
}

// ── RENDER HOTELS ─────────────────────────────────────────────────────────────
function renderHotels(hotels){
  if(!hotels.length)
    return `<p class="empty-state">No hotels found. Add a tab named <strong>hotels</strong> with columns:<br>
      <code>hotel_name, city, check_in, check_out, nights, price_per_night, total_price, stars, image_url, map_query, notes</code></p>`;

  return hotels.map(h=>{
    const stars = parseInt(h.stars)||0;
    const starStr = stars ? '★'.repeat(Math.min(stars,5))+'☆'.repeat(Math.max(0,5-stars)) : '';
    const imgHtml = h.image_url
      ? `<img class="hotel-img" src="${h.image_url}" alt="${h.hotel_name}" loading="lazy" onerror="this.parentElement.querySelector('.hotel-img-placeholder') && (this.style.display='none')">`
      : `<div class="hotel-img-placeholder">🏨</div>`;
    const metaParts = [h.city, h.check_in&&h.check_out ? `${h.check_in} – ${h.check_out}` : '', h.nights ? `${h.nights} nights` : ''].filter(Boolean);
    const priceHtml = (h.price_per_night||h.total_price) ? `<div class="hotel-price-row">
      ${h.price_per_night?`<span class="hotel-price-badge">${h.price_per_night}<span style="font-weight:400;font-size:11px"> /night</span></span>`:''}
      ${h.total_price?`<span class="hotel-price-total">Total: ${h.total_price}</span>`:''}
    </div>` : '';
    const mapQuery = h.map_query || (h.hotel_name + (h.city?' '+h.city:''));
    return `<div class="hotel-card">
      ${imgHtml}
      <div class="hotel-body">
        <div class="hotel-name">${h.hotel_name}</div>
        ${starStr?`<div class="hotel-stars">${starStr}</div>`:''}
        <div class="hotel-meta">${metaParts.join(' · ')}</div>
        ${priceHtml}
        ${h.notes?`<div class="hotel-notes">${h.notes}</div>`:''}
        <a class="hotel-map-link" href="${gm(mapQuery)}" target="_blank">Open in Maps →</a>
      </div>
    </div>`;
  }).join('');
}

// ── RENDER TIPS ───────────────────────────────────────────────────────────────
function renderTips(tips){
  const order=[], map={};
  tips.forEach(t=>{
    if(!map[t.category]){map[t.category]=[];order.push(t.category);}
    map[t.category].push(t);
  });
  return order.map(cat=>`<div class="tips-group">
    <div class="tips-group-header">${cat}</div>
    ${map[cat].map(t=>`<div class="tip-row">
      <div class="tip-name">${t.item}</div>
      <div class="tip-detail">${t.detail}</div>
    </div>`).join('')}
  </div>`).join('');
}

// ── TAB / DAY SWITCHING ───────────────────────────────────────────────────────
function switchTab(id, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
}
function openDay(i){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector('.tabs').children[1].classList.add('active');
  document.getElementById('panel-hourly').classList.add('active');
  selDay(i);
}
function selDay(i){
  _currentDayIdx = i;
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('active'));
  const bar = document.getElementById('day-select-bar');
  if(bar&&bar.children[i]){
    bar.children[i].classList.add('active');
    bar.children[i].scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  }
  if(hourlyView==='single'){
    document.querySelectorAll('.hourly-panel').forEach(p=>p.classList.remove('active'));
    const hp = document.getElementById('hp-'+i);
    if(hp) hp.classList.add('active');
  } else {
    renderMultiDay(i);
  }
}

// ── LOAD ALL DATA ─────────────────────────────────────────────────────────────
async function loadAll(){
  if(!SHEET_ID){
    ['summary','hourly','hotels','tips'].forEach(id=>
      document.getElementById('panel-'+id).innerHTML =
        `<p class="empty-state">Paste your Google Sheet ID above to load your itinerary.</p>`
    );
    return;
  }

  let days, schedule, hotels, tips;
  try {
    [days, schedule, hotels, tips] = await Promise.all([
      fetchCSV(SHEET_TABS.days),
      fetchCSV(SHEET_TABS.schedule),
      fetchCSV(SHEET_TABS.hotels),
      fetchCSV(SHEET_TABS.tips)
    ]);
  } catch(e){
    const msg = `${e.message}. Check the Sheet ID and that it's published to the web.`;
    ['summary','hourly','hotels','tips'].forEach(id=>
      document.getElementById('panel-'+id).innerHTML = errorBanner(msg)
    );
    return;
  }

  document.getElementById('panel-summary').innerHTML = renderCalendar(days);
  document.getElementById('panel-hourly').innerHTML  = renderHourly(days, schedule);
  document.getElementById('panel-hotels').innerHTML  = renderHotels(hotels);
  document.getElementById('panel-tips').innerHTML    = renderTips(tips);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
updateSettingsUI();
loadAll();
</script>
